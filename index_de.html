<!doctype html>
<!--
  WK 1M 2026 — static leaderboard (DE)
  Design: 1240×220 · assets in images/
-->
<html class="wk-1m-banner-embed-root" lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WK 1M 2026 Dynamic Phase 2: Banner</title>
    <link rel="stylesheet" href="https://use.typekit.net/zre5ufn.css" />
    <link rel="stylesheet" href="css/wk-1m-banner.css?v=24" />
  </head>
  <body>
    <div class="wk-1m-page wk-1m-page--embed">
      <div class="wk-1m-banners" lang="de">
        <section class="wk-1m-banner" aria-label="Werbebanner von Lotto">
          <div class="wk-1m-banner__bg" aria-hidden="true">
            <picture>
              <source srcset="images/Stadium.webp" type="image/webp" />
              <img
                class="wk-1m-banner__stadium"
                src="images/Stadium.png"
                width="1240"
                height="220"
                alt=""
              />
            </picture>
            <div class="wk-1m-banner__scene">
              <video
                id="bg-video"
                class="wk-1m-banner__bg-video"
                src="images/Video_1M_HTML_Banner.mp4"
                poster="images/Stadium.png"
                width="1240"
                height="220"
                autoplay
                muted
                loop
                playsinline
                preload="auto"
              ></video>
            </div>
          </div>

          <div class="wk-1m-banner__content">
            <img
              class="wk-1m-banner__logo"
              src="images/Devils-Lotto-logo.svg"
              width="186"
              height="76"
              alt="Lotto"
            />

            <div class="wk-1m-banner__text">
              <div class="wk-1m-banner__copy">
                <p class="wk-1m-banner__hero">€&nbsp;1.000.000</p>
                <div class="wk-1m-banner__headline">
                  <p class="wk-1m-banner__extra" aria-label="EXTRAAAAAA">
                    <span>E</span><span>X</span><span>T</span><span>R</span
                    ><span>A</span><span>A</span><span>A</span><span>A</span
                    ><span>A</span><span>A</span>
                  </p>
                  <span class="wk-1m-banner__jackpot">IM Jackpot</span>
                </div>
              </div>
              <div class="wk-1m-banner__promo-dates">
                <p class="wk-1m-banner__promo-line">bei jeder Ziehung</p>
                <p class="wk-1m-banner__promo-line">
                  vom 13. Juni t.e.m. 24. Juni
                </p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      (function () {
        const video = document.querySelector(".wk-1m-banner__bg-video");
        const bg = document.querySelector(".wk-1m-banner__bg");
        if (!video || !bg) return;
        video.muted = true;
        const showFallback = () => {
          bg.classList.remove("wk-1m-banner__bg--playing");
          bg.classList.add("wk-1m-banner__bg--fallback");
        };
        const onPlaying = () => {
          bg.classList.remove("wk-1m-banner__bg--fallback");
          bg.classList.add("wk-1m-banner__bg--playing");
        };
        video.addEventListener("error", showFallback);
        video.addEventListener("playing", onPlaying);
        const play = () => video.play().catch(showFallback);
        play();
        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) play();
        });
      })();
    </script>
  </body>
</html>

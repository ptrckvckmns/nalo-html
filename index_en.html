<!doctype html>
<!--
  WK 1M 2026 — static leaderboard (EN)
  Design: 1240×220 · assets in images/
-->
<html class="wk-1m-banner-embed-root" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WK 1M 2026 Dynamic Phase 2: Banner</title>
    <link rel="stylesheet" href="https://use.typekit.net/zre5ufn.css" />
    <link rel="stylesheet" href="css/wk-1m-banner.css?v=25" />
  </head>
  <body>
    <div class="wk-1m-page wk-1m-page--embed">
      <div class="wk-1m-banners" lang="en">
        <section class="wk-1m-banner" aria-label="Promotion banner Lotto">
          <div class="wk-1m-banner__bg" aria-hidden="true">
            <picture>
              <source srcset="images/Stadium.webp" type="image/webp" />
              <img
                class="wk-1m-banner__stadium"
                src="images/Stadium.png"
                width="1240"
                height="220"
                alt=""
              />
            </picture>
            <div class="wk-1m-banner__scene">
              <!--
                Poster <img> sits on z-index:1, video sits beneath (opacity:0).
                JS fades poster out and video in once the first frame is decoded.
                This completely eliminates the white/blank flash on load.
              -->
              <img
                class="wk-1m-banner__video-poster"
                src="images/Video_poster.jpg"
                width="1240"
                height="220"
                alt=""
                fetchpriority="high"
              />
              <video
                id="bg-video"
                class="wk-1m-banner__bg-video"
                width="1240"
                height="220"
                autoplay
                muted
                loop
                playsinline
                preload="auto"
              >
                <source src="images/Video_1M_HTML_Banner_opt.webm" type="video/webm" />
                <source src="images/Video_1M_HTML_Banner_opt.mp4" type="video/mp4" />
              </video>
            </div>
          </div>

          <div class="wk-1m-banner__content">
            <img
              class="wk-1m-banner__logo"
              src="images/Devils-Lotto-logo.svg"
              width="186"
              height="76"
              alt="Lotto"
            />

            <div class="wk-1m-banner__text">
              <div class="wk-1m-banner__copy">
                <p class="wk-1m-banner__hero">€&nbsp;1.000.000</p>
                <div class="wk-1m-banner__headline">
                  <p class="wk-1m-banner__extra" aria-label="EXTRAAAAAA">
                    <span>E</span><span>X</span><span>T</span><span>R</span
                    ><span>A</span><span>A</span><span>A</span><span>A</span
                    ><span>A</span><span>A</span>
                  </p>
                  <span class="wk-1m-banner__jackpot">IN THE JACKPOT</span>
                </div>
              </div>
              <div class="wk-1m-banner__promo-dates">
                <p class="wk-1m-banner__promo-line">at every draw</p>
                <p class="wk-1m-banner__promo-line">from 13 June to 24 June</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      (function () {
        var video = document.querySelector(".wk-1m-banner__bg-video");
        var bg    = document.querySelector(".wk-1m-banner__bg");
        if (!video || !bg) return;

        // Ensure muted so autoplay is allowed in all browsers
        video.muted = true;

        function showFallback() {
          bg.classList.remove("wk-1m-banner__bg--playing");
          bg.classList.add("wk-1m-banner__bg--fallback");
        }

        function onReady() {
          // Only swap once the browser has actually decoded a frame
          bg.classList.remove("wk-1m-banner__bg--fallback");
          bg.classList.add("wk-1m-banner__bg--playing");
        }

        video.addEventListener("error", showFallback);

        // 'canplay' fires when the first frame is decoded — before 'playing'
        // which can fire a tick too early on some engines causing the flash.
        video.addEventListener("canplay", onReady, { once: true });

        // Belt-and-suspenders: also listen to 'playing' in case canplay
        // was missed (e.g. video already buffered before listener attached)
        video.addEventListener("playing", onReady, { once: true });

        function play() {
          video.play().catch(showFallback);
        }

        // If the video is already past HAVE_CURRENT_DATA, fire immediately
        if (video.readyState >= 2) {
          onReady();
        }

        play();

        document.addEventListener("visibilitychange", function () {
          if (!document.hidden) play();
        });
      })();
    </script>
  </body>
</html>
